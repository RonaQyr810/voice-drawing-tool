<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 语音绘图工具</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <h1>AI 语音绘图工具</h1>
      <p class="subtitle">纯语音控制 · 无需鼠标键盘</p>
    </header>

    <main class="main">
      <section class="canvas-section">
        <canvas id="drawing-canvas" width="900" height="600"></canvas>
        <div id="cursor-indicator" class="cursor-indicator" aria-hidden="true"></div>
      </section>

      <aside class="panel">
        <div class="status-card" id="voice-status">
          <div class="status-dot" id="status-dot"></div>
          <div class="status-text">
            <span id="status-label">准备就绪</span>
            <span id="status-detail">说「开始监听」启动语音</span>
          </div>
        </div>

        <div class="transcript-card">
          <h3>语音识别</h3>
          <p id="interim-text" class="interim-text"></p>
          <p id="final-text" class="final-text">—</p>
        </div>

        <div class="feedback-card">
          <h3>执行反馈</h3>
          <ul id="feedback-log" class="feedback-log"></ul>
        </div>

        <div class="help-card">
          <h3>常用指令</h3>
          <ul class="help-list">
            <li>「开始监听」/「停止监听」</li>
            <li>「画一个红色的圆」</li>
            <li>「在中心画蓝色矩形 宽200 高100」</li>
            <li>「从左上到右下画一条线」</li>
            <li>「移动画笔到 300 400」</li>
            <li>「撤销」/「清空画布」</li>
            <li>「然后画一个三角形」</li>
          </ul>
        </div>
      </aside>
    </main>

    <footer class="footer">
      <p>请使用 Chrome 或 Edge 浏览器，并允许麦克风权限。首次使用请说「开始监听」。</p>
    </footer>
  </div>

  <script src="js/command-parser.js"></script>
  <script src="js/drawing-engine.js"></script>
  <script src="js/voice-controller.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
